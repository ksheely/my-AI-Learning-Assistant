<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Learning Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 760px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            color: #222;
            text-align: center;
        }

        p {
            color: #555;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-top: 20px;
            box-sizing: border-box;
            resize: vertical;
        }

        button {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #10a37f;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0d8a6c;
        }

        .loading {
            margin-top: 16px;
            text-align: center;
            color: #666;
            display: none;
        }

        .result {
            margin-top: 22px;
            background: #f0f4f8;
            padding: 18px;
            border-radius: 8px;
            white-space: pre-wrap;
            color: #222;
            min-height: 60px;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Learning Assistant</h1>
        <p>Paste a resume summary, personal background, or interests to get career paths, skill gaps, and project ideas.</p>

        <textarea id="inputText" placeholder="Example: I am a software engineering student interested in backend systems, APIs, and cloud development..."></textarea>

        <button onclick="analyze()">Generate Insights</button>

        <div class="loading" id="loading">Thinking...</div>
        <div class="result" id="result">Your results will appear here.</div>

        <div class="footer">
            Built with FastAPI + OpenAI API
        </div>
    </div>

    <script>
        async function analyze() {
            const input = document.getElementById("inputText").value.trim();
            const resultDiv = document.getElementById("result");
            const loadingDiv = document.getElementById("loading");

            if (!input) {
                alert("Please enter some text first.");
                return;
            }

            resultDiv.innerText = "";
            loadingDiv.style.display = "block";

            try {
                const response = await fetch("/analyze", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text: input })
                });

                const data = await response.json();
                resultDiv.innerText = data.result || "No response received.";

            } catch (error) {
                resultDiv.innerText = "Error connecting to the backend.";
            } finally {
                loadingDiv.style.display = "none";
            }
        }
    </script>
</body>
</html>
